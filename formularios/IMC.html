<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="CSS/calculadora.css">
    <link rel="stylesheet" href="CSS/modal-swalert.css">
</head>

<body>
    <h1> Calculadora</h1>

    <fieldset>
        <legend>IMC</legend>
        <h2> Calculo del IMC</h2>
        <form>
            <div class="contenedor-input-etiqueta">
                <label for="txtPeso">Peso: </label>
                <input type="number" id="txtPeso">
            </div>

            <div>
                <label for="txtEstatura"> Estatura: </label>
                <input type="number" id="txtEstatura">
            </div>

            <button type="button" id="btnCalcularIMC">Calcular IMC: </button>
        </form>

        <section id="sctResultadoIMC">
            <h2>IMC:</h2>
            <p></p>
        </section>
    </fieldset>

    <h1> Calculo de la temperatura</h1>

    <fieldset>
        <form>
            <div>
                <label for="txtTemp">temperatura en grados celsius o Farinheit : </label>
                <input type="number" id="txtTemp">
            </div>

            <div>
                <label for="txtConversion"> Tipo de conversion: </label>
                <input type="text" id="txtConversion">
            </div>

            <button type="button" id="btnCalcularTEMP">Calcular temperatura: </button>
        </form>

        <section id="sctResultadoTEMP">
            <h2>Temperatura:</h2>
            <p></p>
        </section>
    </fieldset>



        <!-- antes de cerrar el body se enlazan los archivos JS -->
         <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

        <script src="js/IMC.js"> </script>
        <script src="js/tempt.js"> </script>

</body>

</html>
